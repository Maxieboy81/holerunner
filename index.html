<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hole Runner</title>
<style>
  body {
    margin: 0;
    text-align: center;
    background: linear-gradient(#1a1a1a, #000);
    color: white;
    font-family: Arial, sans-serif;
  }

  h1 { margin: 10px; }

  canvas {
    display: block;
    margin: 0 auto;
    border: 2px solid white;
    background: #222;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    margin-top: 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>🕳️ Hole Runner</h1>
<button onclick="startGame()">Start Game</button>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 500;

let hole, foods, score, timeLeft, gameRunning, highScore = 0;

// Start game
function startGame() {
  hole = { x: 400, y: 250, radius: 20 };
  foods = [];
  score = 0;
  timeLeft = 60;
  gameRunning = true;

  for (let i = 0; i < 30; i++) spawnFood();
}

// Mouse control
canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  if (hole) {
    hole.x += (e.clientX - rect.left - hole.x) * 0.2;
    hole.y += (e.clientY - rect.top - hole.y) * 0.2;
  }
});

// Spawn food
function spawnFood() {
  let type = Math.random();

  if (type < 0.7) {
    foods.push({ x: randX(), y: randY(), r: 6, color: "lime", value: 1 });
  } else if (type < 0.9) {
    foods.push({ x: randX(), y: randY(), r: 10, color: "yellow", value: 2 });
  } else {
    foods.push({ x: randX(), y: randY(), r: 12, color: "red", value: -3 }); // danger
  }
}

function randX() { return Math.random() * canvas.width; }
function randY() { return Math.random() * canvas.height; }

// Timer
setInterval(() => {
  if (gameRunning) {
    timeLeft--;
    if (timeLeft <= 0) {
      gameRunning = false;
      if (score > highScore) highScore = score;
    }
  }
}, 1000);

// Game loop
function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameRunning) {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("Click Start to Play", 250, 250);

    ctx.font = "20px Arial";
    ctx.fillText("High Score: " + highScore, 330, 300);

    requestAnimationFrame(update);
    return;
  }

  // Draw hole
  ctx.beginPath();
  ctx.arc(hole.x, hole.y, hole.radius, 0, Math.PI * 2);
  ctx.fillStyle = "black";
  ctx.fill();

  // Draw foods
  for (let i = foods.length - 1; i >= 0; i--) {
    let f = foods[i];

    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = f.color;
    ctx.fill();

    let dx = hole.x - f.x;
    let dy = hole.y - f.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < hole.radius && hole.radius > f.r) {
      foods.splice(i, 1);

      if (f.value > 0) {
        hole.radius += 0.7;
        score += f.value;
      } else {
        hole.radius = Math.max(10, hole.radius - 5);
      }

      spawnFood();
    }
  }

  // UI
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 10, 25);
  ctx.fillText("Time: " + timeLeft, 10, 50);

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
